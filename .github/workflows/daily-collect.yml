name: Daily Knowledge Collection

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: v2-automation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run knowledge collection
        working-directory: v2-automation
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/v2-automation
        run: |
          echo "=== Checking directory structure ==="
          ls -la
          echo "=== Checking pipeline directory ==="
          ls -la pipeline/
          echo "=== Testing Python import ==="
          python -c "import sys; print(sys.path)"
          python -c "from pipeline.model_client import create_provider; print('Import successful')"
          echo "=== Running pipeline ==="
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose 2>&1

      - name: Validate JSON files
        working-directory: v2-automation
        run: |
          python hooks/validate_json.py knowledge/

      - name: Check article quality
        working-directory: v2-automation
        run: |
          python hooks/check_quality.py knowledge/articles/

      - name: Get article count
        id: stats
        working-directory: v2-automation
        run: |
          NEW_COUNT=$(git status --porcelain knowledge/ | grep -E '\.json$' | wc -l | tr -d ' ')
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "COLLECTION_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.stats.outputs.new_count > 0
        working-directory: v2-automation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          git commit -m "Add ${{ steps.stats.outputs.new_count }} articles (${{ steps.stats.outputs.COLLECTION_DATE }})"
          git push
